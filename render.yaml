services:
  - type: web
    name: stocksync-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stocksync-db
          property: connectionString
      - key: LOW_STOCK_THRESHOLD
        value: "5"
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: stocksync-db
    plan: free
    databaseName: stocksync
    user: stocksync
